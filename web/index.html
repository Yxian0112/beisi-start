<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级登录系统 - 全栈练习</title>
    <style>
        /* --- 1. 高级视觉样式 (CSS) --- */
        body {
            /* 动态流体渐变背景 */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 磨砂玻璃卡片 */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            width: 340px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-8px);
        }

        h2 {
            margin: 0 0 25px 0;
            color: #2c3e50;
            font-size: 26px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 1.5px solid transparent;
            border-radius: 12px;
            background: rgba(243, 244, 246, 0.8);
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            background: #fff;
            border-color: #23a6d5;
            box-shadow: 0 0 15px rgba(35, 166, 213, 0.2);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #23a6d5;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background: #1e8eb7;
            box-shadow: 0 5px 15px rgba(35, 166, 213, 0.4);
        }

        button:disabled {
            background: #94d3e9;
            cursor: not-allowed;
        }

        /* Loading 旋转动画 */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            min-height: 20px;
        }

        .success-box { display: none; }
        .token-text {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            word-break: break-all;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="card" id="login-card">
        <h2>系统登录</h2>
        <input type="text" id="username" placeholder="用户名 (admin)">
        <input type="password" id="password" placeholder="密码 (123456)">
        <div id="message"></div>
        <button id="login-btn">登 录</button>
    </div>

    <div class="card success-box" id="welcome-card">
        <div style="font-size: 50px; margin-bottom: 10px;">✨</div>
        <h2 id="welcome-user"></h2>
        <div class="token-text">
            <strong>模拟 Token:</strong><br>
            <span id="token-display"></span>
        </div>
        <button onclick="logout()" style="background: #6c757d;">安全退出</button>
    </div>

    <script>
        const loginBtn = document.getElementById('login-btn');
        const loginCard = document.getElementById('login-card');
        const msgBox = document.getElementById('message');

        // 页面启动检查：如果本地有Token，直接进欢迎页
        window.onload = () => {
            const token = localStorage.getItem('my_token');
            const user = localStorage.getItem('my_username');
            if (token && user) showWelcome(user, token);
        };

        // 登录按钮点击逻辑
        loginBtn.onclick = async () => {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();

            // 1. 基础验证 + 抖动效果
            if (!u || !p) {
                msgBox.innerText = "请输入完整的账号密码";
                loginCard.style.animation = "shake 0.4s";
                setTimeout(() => loginCard.style.animation = "", 400);
                return;
            }

            // 2. 显示加载中
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="spinner"></div> 正在建立安全连接...';
            msgBox.innerText = "";

            try {
                // 3. 发送网络请求
                const response = await fetch('http://127.0.0.1:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                const res = await response.json();

                // 4. 处理结果
                if (res.code === 0) {
                    // 模拟一秒延迟，增加 Loading 的真实感
                    setTimeout(() => {
                        localStorage.setItem('my_token', res.data.token);
                        localStorage.setItem('my_username', u);
                        showWelcome(u, res.data.token);
                    }, 800);
                } else {
                    msgBox.innerText = res.message;
                    loginBtn.disabled = false;
                    loginBtn.innerText = "登 录";
                }
            } catch (err) {
                msgBox.innerText = "后端服务器未响应";
                loginBtn.disabled = false;
                loginBtn.innerText = "登 录";
            }
        };

        function showWelcome(user, token) {
            loginCard.style.display = 'none';
            document.getElementById('welcome-card').style.display = 'block';
            document.getElementById('welcome-user').innerText = "欢迎回来, " + user;
            document.getElementById('token-display').innerText = token;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
